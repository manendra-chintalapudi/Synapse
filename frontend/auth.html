<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Sign in - Synapse</title><script src="config.js"></script><script type="module" src="auth.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--ink:#1f2236;--muted:#777b8f;--accent:#424dd2;--accent-soft:#eef0ff;--line:#e6e7ed;--error:#b93832;--success:#08775a}
    *{box-sizing:border-box}html,body{min-height:100%}body{margin:0;min-height:100dvh;font-family:"Plus Jakarta Sans",sans-serif;color:var(--ink);background:#f1f2f5;display:grid;place-items:center;padding:24px}
    button,input,select{font:inherit}.shell{width:min(960px,100%);min-height:640px;background:#fff;border:1px solid #e2e3e8;border-radius:30px;box-shadow:0 28px 80px rgba(26,30,70,.13);display:grid;grid-template-columns:.9fr 1.1fr;overflow:hidden}
    .brand-panel{position:relative;background:#424dd2;color:#fff;padding:38px;display:flex;flex-direction:column;overflow:hidden;transition:background .3s,color .3s}.shell.signup .brand-panel{background:#eef0ff;color:var(--ink)}
    .brand{position:relative;z-index:3;display:flex;align-items:center;gap:10px;font-size:20px;font-weight:800;color:inherit;text-decoration:none}.brand img{height:30px;width:auto}.brand-scene{position:relative;z-index:2;flex:1;display:grid;place-items:center;min-height:330px}.login-scene{width:280px;height:280px;position:relative;display:grid;place-items:center}.logo-focus{width:102px;height:102px;background:#fff;border-radius:26px;display:grid;place-items:center;box-shadow:0 18px 50px rgba(20,23,80,.22);animation:logoFloat 4.5s ease-in-out infinite}.logo-focus img{width:72px;height:72px;object-fit:contain}.orbit{position:absolute;border:1px solid rgba(255,255,255,.28);border-radius:50%;animation:orbitSpin 12s linear infinite}.orbit.one{inset:22px}.orbit.two{inset:0;animation-duration:18s;animation-direction:reverse}.orbit i{position:absolute;width:9px;height:9px;border-radius:50%;background:#fff;box-shadow:0 0 0 6px rgba(255,255,255,.12);left:50%;top:-5px}.orbit.two i{top:50%;left:auto;right:-5px}.mascot-scene{display:none;width:115%;height:360px}.mascot-scene video{width:100%;height:100%;object-fit:contain;mix-blend-mode:multiply;animation:mascotIn .5s ease-out}.shell.signup .login-scene{display:none}.shell.signup .mascot-scene{display:block}
    @keyframes logoFloat{50%{transform:translateY(-9px) rotate(2deg)}}@keyframes orbitSpin{to{transform:rotate(360deg)}}@keyframes mascotIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
    .panel-copy{position:relative;z-index:2}.panel-copy h2{font-size:30px;line-height:1.15;letter-spacing:-.9px;margin:0 0 10px}.panel-copy p{font-size:13.5px;line-height:1.6;margin:0;color:rgba(255,255,255,.74)}.shell.signup .panel-copy p{color:var(--muted)}
    .auth{position:relative;padding:48px 58px;display:flex;flex-direction:column;justify-content:center}.back{position:absolute;right:26px;top:22px;color:#777b8f;text-decoration:none;font-size:12px;font-weight:700}.auth h1{font-size:32px;letter-spacing:-1px;margin:0 0 8px}.copy{color:var(--muted);font-size:13.5px;line-height:1.55;margin:0 0 22px}.tabs{display:grid;grid-template-columns:1fr 1fr;background:#f3f3f6;padding:5px;border-radius:14px;margin-bottom:23px}.tab{border:0;background:transparent;border-radius:10px;padding:10px;color:#858895;font-weight:700;cursor:pointer}.tab.active{background:#fff;color:var(--ink);box-shadow:0 2px 10px rgba(25,28,65,.08)}
    .field{display:grid;gap:7px;margin-bottom:14px}.field label{font-size:11px;font-weight:800;letter-spacing:.04em}.field input,.field select{width:100%;border:1px solid var(--line);background:#fff;border-radius:12px;padding:12px 14px;color:var(--ink);outline:none;font-size:14px}.field input:focus,.field select:focus{border-color:#6972dd;box-shadow:0 0 0 4px var(--accent-soft)}.signup-only{display:none}.shell.signup .signup-only{display:grid}.login-options{display:flex;align-items:center;justify-content:space-between;margin:1px 0 17px;font-size:11.5px}.remember{display:flex;align-items:center;gap:7px;color:#616579}.remember input{accent-color:var(--accent)}.link-button{border:0;background:transparent;color:var(--accent);font-weight:700;cursor:pointer;padding:0}.shell.signup .login-options{display:none}
    .primary{width:100%;border:0;border-radius:13px;background:var(--accent);color:#fff;padding:13px;font-weight:800;cursor:pointer;transition:.2s}.primary:hover{transform:translateY(-1px);box-shadow:0 12px 28px rgba(66,77,210,.25)}.primary:disabled{opacity:.6;transform:none}.status{min-height:18px;margin:10px 0 0;font-size:11.5px;line-height:1.45}.error{color:var(--error)}.success{color:var(--success)}.fine{font-size:10.5px;color:#989baa;text-align:center;margin:12px 0 0;line-height:1.5}
    @media(max-width:760px){body{padding:0;background:#fff;display:block}.shell{min-height:100dvh;border:0;border-radius:0;display:flex;flex-direction:column;box-shadow:none}.brand-panel{height:245px;min-height:245px;padding:20px 22px 42px}.brand{font-size:17px}.brand img{height:25px}.brand-scene{position:absolute;right:15px;top:48px;min-height:0;width:155px;height:145px}.login-scene{width:145px;height:145px}.logo-focus{width:60px;height:60px;border-radius:17px}.logo-focus img{width:43px;height:43px}.orbit.one{inset:13px}.orbit.two{inset:0}.panel-copy{max-width:54%;margin-top:auto}.panel-copy h2{font-size:23px}.panel-copy p{font-size:11.5px}.auth{margin-top:-26px;background:#fff;border-radius:28px 28px 0 0;padding:30px 22px calc(28px + env(safe-area-inset-bottom));min-height:calc(100dvh - 219px);justify-content:flex-start}.back{top:19px;right:20px}.auth h1{font-size:27px;margin-top:6px}.copy{margin-bottom:18px}.tabs{margin-bottom:20px}.field input,.field select{padding:13px}.shell.signup .brand-panel{height:220px;min-height:220px}.shell.signup .brand-scene{width:185px;height:175px;right:-6px;top:35px}.shell.signup .mascot-scene{height:175px}.shell.signup .auth{min-height:calc(100dvh - 194px);padding-top:27px}.shell.signup .panel-copy{max-width:48%}}
    @media(max-width:370px){.brand-panel{height:220px;min-height:220px}.panel-copy p{display:none}.auth{min-height:calc(100dvh - 194px)}.auth h1{font-size:24px}.field{margin-bottom:11px}.tabs{margin-bottom:15px}}
    @media(prefers-reduced-motion:reduce){.logo-focus,.orbit,.mascot-scene video{animation:none}}
  </style>
</head>
<body data-auth-page="true"><main class="shell" id="auth-shell">
  <section class="brand-panel"><a class="brand" href="/"><img src="assets/synapse-logo.png" alt="Synapse">Synapse</a>
    <div class="brand-scene" aria-hidden="true"><div class="login-scene"><div class="orbit one"><i></i></div><div class="orbit two"><i></i></div><div class="logo-focus"><img src="assets/synapse-logo-glow.png" alt=""></div></div><div class="mascot-scene"><video autoplay muted loop playsinline poster="assets/synapse-mascot-poster.jpg"><source src="assets/synapse-mascot.mp4" type="video/mp4"></video></div></div>
    <div class="panel-copy"><h2 id="visual-title">Welcome back.</h2><p id="visual-copy">Continue your traceable plant investigations securely.</p></div>
  </section>
  <section class="auth"><a class="back" href="/">Back to home</a><h1 id="auth-title">Sign in</h1><p class="copy" id="auth-copy">Use your Synapse credentials to continue.</p>
    <div class="tabs" role="tablist"><button class="tab active" id="auth-tab-login" type="button" role="tab" aria-selected="true">Log In</button><button class="tab" id="auth-tab-register" type="button" role="tab" aria-selected="false">Sign Up</button></div>
    <form id="auth-form"><div class="field signup-only"><label for="full_name">FULL NAME</label><input id="full_name" name="full_name" autocomplete="name" placeholder="Your name"></div><div class="field"><label for="email">USER ID / EMAIL</label><input id="email" name="email" type="email" autocomplete="email" required placeholder="you@company.com"></div><div class="field"><label for="password">PASSWORD</label><input id="password" name="password" type="password" autocomplete="current-password" required minlength="8" placeholder="At least 8 characters"></div><div class="field signup-only"><label for="confirm_password">CONFIRM PASSWORD</label><input id="confirm_password" name="confirm_password" type="password" autocomplete="new-password" placeholder="Repeat your password"></div><div class="field signup-only"><label for="role">PLANT ROLE</label><select id="role" name="role"><option value="maintenance">Maintenance</option><option value="qa">Quality Assurance</option><option value="ops">Operations</option><option value="admin">Admin (demo access)</option></select></div>
      <div class="login-options"><label class="remember"><input type="checkbox" checked>Remember me</label><button class="link-button" id="forgot-password" type="button">Forgot password?</button></div><button class="primary" id="auth-submit" type="submit">Log in to Synapse</button><p class="status" id="auth-status" role="status"></p></form><p class="fine">Passwords are processed by Supabase Auth and are never stored by the Synapse frontend.</p>
  </section>
</main></body></html>
