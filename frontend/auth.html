<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sign in - Synapse</title><script src="config.js"></script><script type="module" src="auth.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:"Plus Jakarta Sans",sans-serif;color:#20233a;background:#f4f5fb;display:grid;place-items:center;padding:24px;overflow:hidden}body:before,body:after{content:"";position:fixed;border-radius:50%;filter:blur(30px);opacity:.8;pointer-events:none}body:before{width:44vw;height:44vw;left:-12vw;bottom:-20vw;background:#6bc9ff}body:after{width:42vw;height:42vw;right:-10vw;top:-18vw;background:#ba90ff}.shell{position:relative;width:min(980px,100%);min-height:590px;background:rgba(255,255,255,.82);border:1px solid rgba(255,255,255,.9);border-radius:30px;box-shadow:0 30px 90px rgba(67,73,150,.16);backdrop-filter:blur(22px);display:grid;grid-template-columns:1.08fr .92fr;overflow:hidden}.visual{padding:42px;display:flex;flex-direction:column;justify-content:space-between;background:linear-gradient(145deg,rgba(229,240,255,.78),rgba(235,225,255,.72))}.brand{display:flex;align-items:center;gap:10px;font-size:20px;font-weight:800;text-decoration:none;color:inherit}.brand img{height:30px}.orb{width:min(330px,80%);aspect-ratio:1;object-fit:contain;align-self:center;filter:drop-shadow(0 22px 35px rgba(75,84,210,.2))}.visual h2{font-size:32px;line-height:1.12;margin:0;letter-spacing:-1px}.visual p{color:#686d87;line-height:1.65;margin:12px 0 0}.auth{padding:58px 54px;display:flex;flex-direction:column;justify-content:center}.back{position:absolute;right:28px;top:24px;color:#6f748e;text-decoration:none;font-size:13px}.auth h1{font-size:34px;letter-spacing:-1.2px;margin:0 0 10px}.copy{color:#777c94;margin:0 0 30px;line-height:1.55}.field{display:grid;gap:8px;margin:0 0 17px}.field label{font-size:12px;font-weight:800;color:#555a74}.field input{width:100%;border:1px solid #e2e4ef;background:#fafbff;border-radius:13px;padding:14px 15px;font:inherit;outline:none}.field input:focus{border-color:#6670e8;box-shadow:0 0 0 4px #eef0ff}.primary{width:100%;border:0;border-radius:13px;background:#20233a;color:white;padding:14px;font:inherit;font-weight:800;cursor:pointer;margin-top:5px}.primary:disabled{opacity:.6}.switch{border:0;background:none;color:#4b54d2;font:inherit;font-size:13px;font-weight:700;cursor:pointer;margin-top:20px}.status{min-height:21px;margin:14px 0 0;font-size:12px;line-height:1.5}.error{color:#bd3d35}.success{color:#08795b}.fine{font-size:11px;color:#9a9eb1;text-align:center;margin-top:20px;line-height:1.55}@media(max-width:720px){body{padding:0;display:block}.shell{min-height:100vh;border-radius:0;display:block}.visual{height:235px;padding:24px}.visual .orb{position:absolute;width:170px;right:5px;top:50px}.visual div:last-child{max-width:65%}.visual h2{font-size:23px}.visual p{font-size:12px}.auth{padding:38px 25px}.auth h1{font-size:29px}.back{top:25px}.copy{margin-bottom:24px}}
</style></head>
<body data-auth-page="true"><main class="shell"><section class="visual">
<a class="brand" href="/"><img src="assets/synapse-logo.png" alt="">Synapse</a>
<video class="orb" autoplay muted loop playsinline poster="assets/orb-white-poster.jpg"><source src="assets/orb-white.mp4" type="video/mp4"></video>
<div><h2>One secure brain for your plant.</h2><p>Traceable answers across equipment, quality, failures, and compliance.</p></div>
</section><section class="auth"><a class="back" href="/">Back to home</a><h1 id="auth-title">Welcome back</h1><p class="copy" id="auth-copy">Sign in to enter the Synapse plant console.</p>
<form id="auth-form"><div class="field"><label for="email">WORK EMAIL</label><input id="email" name="email" type="email" autocomplete="email" required placeholder="you@company.com"></div><div class="field"><label for="password">PASSWORD</label><input id="password" name="password" type="password" autocomplete="current-password" required minlength="8" placeholder="At least 8 characters"></div><button class="primary" id="auth-submit" type="submit">Sign in</button><p class="status" id="auth-status" role="status"></p></form>
<button class="switch" id="auth-switch" type="button">New to Synapse? Create an account</button><p class="fine">Protected by Supabase authentication. Access is subject to your organization&rsquo;s plant-security policy.</p>
</section></main></body></html>
